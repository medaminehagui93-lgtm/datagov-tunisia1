<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataGov Tunisie — INS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1B4F8A;--blue2:#153d6e;--sky:#00AEEF;--green:#8DC63F;
  --bg:#F0F4F9;--card:#FFFFFF;--border:#C8D9EC;--border2:#B0C8E0;
  --text:#1a2a3a;--muted:#5a7a9a;--hint:#9ab0c8;
  --shadow:0 1px 4px rgba(27,79,138,.08);
  --font:'Segoe UI',system-ui,sans-serif;--mono:'Consolas',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
input,select,button,textarea{font-family:var(--font)}
button{cursor:pointer}
a{color:var(--blue);text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fu{animation:fadeUp .3s ease both}
.s1{animation-delay:.05s}.s2{animation-delay:.1s}.s3{animation-delay:.15s}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);box-shadow:var(--shadow)}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-blue:hover{background:var(--blue2)}
.btn-sky{background:var(--sky);color:#fff;border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer}
.btn-outline{background:transparent;color:var(--blue);border:1.5px solid var(--blue);border-radius:9px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
.btn-outline:hover{background:var(--blue);color:#fff}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--muted);transition:.15s}
.nav-item:hover{background:var(--bg);color:var(--blue)}
.nav-item.active{background:rgba(27,79,138,.1);color:var(--blue);font-weight:500}
input[type=text],input[type=email],input[type=password],select{
  width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);
  background:#fafcff;color:var(--text);font-size:13px;outline:none;transition:border .15s
}
input:focus,select:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(0,174,239,.1)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// BASE DE DONNÉES LOCALE (localStorage)
// ═══════════════════════════════════════════════════
const DB = {
  load(k){try{return JSON.parse(localStorage.getItem('dg_'+k)||'[]')}catch{return[]}},
  save(k,v){localStorage.setItem('dg_'+k,JSON.stringify(v))},
  get users(){return this.load('users')},
  get institutions(){return this.load('inst')},
  get transmissions(){return this.load('tx')},
  set users(v){this.save('users',v)},
  set institutions(v){this.save('inst',v)},
  set transmissions(v){this.save('tx',v)},

  init(){
    if(this.users.length) return;
    const insts=[
      {id:'ins',code:'INS-000',nom:'Institut National de la Statistique',secteur:'autre',gouvernorat:'Tunis',taux:100,score:99,statut:'active'},
      {id:'ms',code:'MS-001',nom:'Ministère de la Santé',secteur:'sante',gouvernorat:'Tunis',taux:96,score:94,statut:'active'},
      {id:'me',code:'ME-001',nom:"Ministère de l'Éducation",secteur:'education',gouvernorat:'Tunis',taux:78,score:87,statut:'active'},
      {id:'maf',code:'MAF-001',nom:"Ministère de l'Agriculture",secteur:'agriculture',gouvernorat:'Tunis',taux:56,score:72,statut:'active'},
      {id:'mf',code:'MF-001',nom:'Ministère des Finances',secteur:'finance',gouvernorat:'Tunis',taux:88,score:91,statut:'active'},
    ];
    this.institutions=insts;
    const users=[
      {id:'u1',email:'ins@ins.tn',password:'INS2025!',nom:'Trabelsi',prenom:'Sonia',role:'super_admin',instId:'ins'},
      {id:'u2',email:'admin@sante.gov.tn',password:'Admin2025!',nom:'Ben Salah',prenom:'Ahmed',role:'admin_institution',instId:'ms'},
      {id:'u3',email:'admin@education.gov.tn',password:'Admin2025!',nom:'Gharbi',prenom:'Sonia',role:'admin_institution',instId:'me'},
      {id:'u4',email:'admin@agriculture.gov.tn',password:'Admin2025!',nom:'Chabbi',prenom:'Mohamed',role:'admin_institution',instId:'maf'},
      {id:'u5',email:'admin@finances.gov.tn',password:'Admin2025!',nom:'Belhaj',prenom:'Karim',role:'admin_institution',instId:'mf'},
    ];
    this.users=users;
    const txs=[
      {id:'tx1',nom:'indicateurs_sante_T2_2025.xlsx',fmt:'xlsx',statut:'validated',score:97,lignes:847,instId:'ms',date:Date.now()-7200000},
      {id:'tx2',nom:'rapport_epidemio.pdf',fmt:'pdf',statut:'processing',score:0,lignes:0,instId:'ms',date:Date.now()-3600000},
      {id:'tx3',nom:'hopitaux_equipements.xlsx',fmt:'xlsx',statut:'error',score:61,lignes:312,instId:'ms',date:Date.now()-86400000},
    ];
    this.transmissions=txs;
  },

  login(email,pass){return this.users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.password===pass)||null},

  register(data){
    const users=this.users,insts=this.institutions;
    if(users.find(u=>u.email.toLowerCase()===data.email.toLowerCase())) return{error:'Email déjà utilisé'};
    if(insts.find(i=>i.code.toUpperCase()===data.code.toUpperCase())) return{error:'Code INS déjà enregistré'};
    const instId='inst_'+Date.now();
    const newInst={id:instId,code:data.code.toUpperCase(),nom:data.nom,secteur:data.secteur,gouvernorat:data.gouvernorat,taux:0,score:0,statut:'active'};
    const newUser={id:'u_'+Date.now(),email:data.email,password:data.password,nom:data.nom_resp,prenom:data.prenom_resp,role:'admin_institution',instId};
    this.institutions=[...insts,newInst];
    this.users=[...users,newUser];
    return{user:newUser};
  },

  getInst(id){return this.institutions.find(i=>i.id===id)},
  getTx(instId,role){
    const all=this.transmissions;
    return role==='super_admin'?all:all.filter(t=>t.instId===instId);
  },
  addTx(tx){this.transmissions=[tx,...this.transmissions]},
  updatePwd(userId,newPwd){
    this.users=this.users.map(u=>u.id===userId?{...u,password:newPwd}:u);
  },
};
DB.init();

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let state={view:'home',user:null,tab:'dashboard'};

const GOUVERNORATS=['Tunis','Ariana','Ben Arous','Manouba','Nabeul','Zaghouan','Bizerte','Béja','Jendouba','Le Kef','Siliana','Kairouan','Kasserine','Sidi Bouzid','Sousse','Monastir','Mahdia','Sfax','Gafsa','Tozeur','Kébili','Gabès','Médenine','Tataouine'];
const SECTEURS=[{v:'sante',l:'Santé'},{v:'education',l:'Éducation'},{v:'agriculture',l:'Agriculture'},{v:'transport',l:'Transport'},{v:'finance',l:'Finances'},{v:'environnement',l:'Environnement'},{v:'emploi',l:'Emploi'},{v:'justice',l:'Justice'},{v:'autre',l:'Autre'}];

function timeAgo(ts){
  const d=(Date.now()-ts)/1000;
  if(d<60)return "À l'instant";
  if(d<3600)return`Il y a ${Math.floor(d/60)} min`;
  if(d<86400)return`Il y a ${Math.floor(d/3600)}h`;
  return`Il y a ${Math.floor(d/86400)}j`;
}

function pill(s){
  const m={
    validated:{bg:'#e8f8ef',c:'#1a7a3c',t:'✓ Validé'},
    processing:{bg:'#e3eef9',c:'#1B4F8A',t:'⟳ En cours'},
    error:{bg:'#fdecea',c:'#c0392b',t:'⚠ Erreur'},
  }[s]||{bg:'#f0f0f0',c:'#666',t:s};
  return`<span style="font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px;color:${m.c};background:${m.bg}">${m.t}</span>`;
}

function fmtIcon(fmt){
  return fmt==='pdf'?'📄':fmt==='csv'?'📋':'📊';
}

// ═══════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════
function render(){
  document.getElementById('app').innerHTML=pages[state.view]();
  bind();
}

function goto(view){state.view=view;render();}

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
function setTab(tab){
  state.tab=tab;
  const titles={dashboard:'Tableau de bord',upload:'Transmettre des données',indicateurs:'Indicateurs statistiques',ai:'Assistant IA',ins:'Vue nationale INS',equipe:'Équipe',settings:'Paramètres'};
  document.getElementById('tab-title').textContent=titles[tab]||tab;
  document.querySelectorAll('[id^="nav-"]').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+tab);
  if(nav) nav.classList.add('active');
  document.getElementById('main-content').innerHTML=TABS[tab]?TABS[tab]():'';
  if(tab==='upload') bindUpload();
  if(tab==='ai') document.getElementById('ai-in')?.focus();
}

function doLogin(){
  const em=document.getElementById('em').value.trim();
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');
  if(!em||!pw){err.style.display='block';err.textContent='Veuillez remplir tous les champs.';return}
  const user=DB.login(em,pw);
  if(!user){err.style.display='block';err.textContent='Email ou mot de passe incorrect.';return}
  state.user=user;state.view='app';state.tab='dashboard';render();
  setTimeout(()=>setTab('dashboard'),50);
}

function doRegister(){
  const nom=document.getElementById('r-nom').value.trim();
  const code=document.getElementById('r-code').value.trim();
  const sec=document.getElementById('r-sec').value;
  const gov=document.getElementById('r-gov').value;
  const prenom=document.getElementById('r-prenom').value.trim();
  const nomr=document.getElementById('r-nomr').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const pw=document.getElementById('r-pw').value;
  const pw2=document.getElementById('r-pw2').value;
  const err=document.getElementById('rerr');

  if(!nom||!code||!sec||!gov||!prenom||!nomr||!email||!pw){
    err.style.display='block';err.textContent='Veuillez remplir tous les champs obligatoires (*).';return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    err.style.display='block';err.textContent='Adresse email invalide.';return}
  if(pw.length<6){err.style.display='block';err.textContent='Mot de passe trop court (6 caractères minimum).';return}
  if(pw!==pw2){err.style.display='block';err.textContent='Les mots de passe ne correspondent pas.';return}

  const result=DB.register({nom,code,secteur:sec,gouvernorat:gov,nom_resp:nomr,prenom_resp:prenom,email,password:pw});
  if(result.error){err.style.display='block';err.textContent=result.error;return}

  state.user=result.user;state.view='app';state.tab='dashboard';render();
  setTimeout(()=>setTab('dashboard'),50);
}

function doLogout(){state.user=null;state.view='login';render();}

function quickFill(e,p){
  document.getElementById('em').value=e;
  document.getElementById('pw').value=p;
}

function chkPwd(){
  const p=document.getElementById('r-pw')?.value;
  const p2=document.getElementById('r-pw2')?.value;
  const h=document.getElementById('pw-hint');
  if(!h||!p) return;
  if(p.length<6){h.style.color='#c0392b';h.textContent='Trop court (6 caractères minimum)';return}
  if(p2&&p!==p2){h.style.color='#c0392b';h.textContent='Les mots de passe ne correspondent pas';return}
  if(p2&&p===p2){h.style.color='#1a7a3c';h.textContent='✓ Mots de passe identiques';return}
  h.style.color='var(--muted)';h.textContent='';
}

function changePwd(){
  const old=document.getElementById('s-old')?.value;
  const nw=document.getElementById('s-new')?.value;
  const nw2=document.getElementById('s-new2')?.value;
  const msg=document.getElementById('pwd-msg');
  if(!old||!nw||!nw2){msg.style.display='block';msg.style.background='#fdecea';msg.style.color='#c0392b';msg.textContent='Remplissez tous les champs.';return}
  if(old!==state.user.password){msg.style.display='block';msg.style.background='#fdecea';msg.style.color='#c0392b';msg.textContent='Mot de passe actuel incorrect.';return}
  if(nw.length<6){msg.style.display='block';msg.style.background='#fdecea';msg.style.color='#c0392b';msg.textContent='Nouveau mot de passe trop court (6 caractères minimum).';return}
  if(nw!==nw2){msg.style.display='block';msg.style.background='#fdecea';msg.style.color='#c0392b';msg.textContent='Les nouveaux mots de passe ne correspondent pas.';return}
  DB.updatePwd(state.user.id,nw);
  state.user.password=nw;
  msg.style.display='block';msg.style.background='#e8f8ef';msg.style.color='#1a7a3c';msg.textContent='✓ Mot de passe modifié avec succès.';
  document.getElementById('s-old').value='';document.getElementById('s-new').value='';document.getElementById('s-new2').value='';
}

function handleDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)uploadFile(f);}

function bindUpload(){
  const fi=document.getElementById('fi');
  if(fi) fi.onchange=e=>{if(e.target.files[0])uploadFile(e.target.files[0]);};
}

function uploadFile(file){
  const st=document.getElementById('up-status');
  if(!st)return;
  const dz=document.getElementById('dz');
  if(dz){dz.style.borderColor='var(--sky)';dz.style.background='rgba(0,174,239,.03)';}
  st.innerHTML=`
    <div class="card" style="padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;border-left:3px solid var(--sky)">
      <div style="width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin 1s linear infinite"></div>
      <div>
        <div style="font-size:12px;font-weight:500">${file.name}</div>
        <div style="font-size:11px;color:var(--muted)">Analyse IA en cours...</div>
      </div>
    </div>`;
  setTimeout(()=>{
    const score=Math.floor(Math.random()*20)+77;
    const ext=file.name.split('.').pop().toLowerCase();
    const lignes=['xlsx','xls','csv'].includes(ext)?Math.floor(Math.random()*800)+100:0;
    const anomalies=Math.floor(Math.random()*4);
    const tx={id:'tx_'+Date.now(),nom:file.name,fmt:ext,statut:anomalies>3?'error':'validated',score,lignes,instId:state.user.instId,date:Date.now()};
    DB.addTx(tx);
    if(dz){dz.style.borderColor='var(--border)';dz.style.background='#fff';}
    st.innerHTML=`
      <div style="background:#e8f8ef;border:1px solid #a8dbc0;border-radius:10px;padding:13px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
        <i class="ti ti-circle-check" style="font-size:20px;color:#1a7a3c"></i>
        <div>
          <div style="font-size:12px;font-weight:600;color:#1a7a3c">${file.name} — Analysé avec succès</div>
          <div style="font-size:11px;color:#2d8a4a">${lignes?lignes.toLocaleString('fr')+' lignes · ':''} Score qualité : ${score}% · ${anomalies} anomalie(s) détectée(s)</div>
        </div>
      </div>`;
    const hist=document.getElementById('tx-hist');
    if(hist) hist.innerHTML=DB.getTx(state.user.instId,state.user.role).slice(0,10).map(t=>`
      <div style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);transition:.15s" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='transparent'">
        <div style="width:30px;height:30px;border-radius:7px;background:${t.fmt==='pdf'?'#fdecea':t.fmt==='csv'?'#e8f8ef':'#e3eef9'};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${fmtIcon(t.fmt)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.nom}</div>
          <div style="font-size:10px;color:var(--muted)">${timeAgo(t.date)}</div>
        </div>
        ${t.score?`<span style="font-size:11px;font-weight:600;font-family:var(--mono);color:${t.score>=80?'var(--green)':t.score>=60?'#e8a000':'#c0392b'}">${t.score}%</span>`:''}
        ${pill(t.statut)}
      </div>
    `).join('')||'<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">Aucune</div>';
  },2500);
}

const AI_R={
  anomalie:`📊 Analyse complète — Fichiers scannés ✓\n\n⚠️ Ligne 142 : taux de mortalité négatif (−2.3) → impossible\n⚠️ Lignes 289-291 : données manquantes (Médenine)\n⚠️ Colonne H : format date incohérent (mm/dd vs dd/mm)\n\n✅ Correction automatique disponible pour 7/8 anomalies`,
  manquant:`📋 Indicateurs manquants — Nomenclature INS v2.3\n\n3 indicateurs obligatoires absents :\n• I-142 : Taux d'occupation hospitalière 🔴\n• I-089 : Mortalité néonatale Q2 🔴\n• I-201 : Personnel médical / 1000 hab 🟡\n\nJe peux pré-remplir ces champs depuis votre historique T1.`,
  resume:`📄 Résumé exécutif — T2 2025\n\n• Couverture vaccinale : 87% (↑3pts vs T1)\n• Consultations ambulatoires : +12%\n• Lits disponibles : stable 6.2/1000\n\n⚠️ Alerte : mortalité maternelle en hausse dans 3 gouvernorats du Sud\n\nScore de performance sectoriel : 78/100`,
  compare:`📊 Comparaison T2 vs T1 2025\n\n• Consultations : 307 260 (↑+8.3%)\n• Couverture NESS : 86.2% (↑+2.1pts)\n• Délai urgences : 35 min (↓-12 min)\n• Budget médic. : +4.2% ⚠️\n\nTendance globale : positive`,
  default:`Je traite votre demande. Pour une analyse précise, précisez le gouvernorat ou la période.\n\nCapacités disponibles : analyse Excel/PDF, détection d'anomalies, indicateurs manquants, résumés exécutifs, comparaisons trimestrielles.`,
};

function aiMsg(txt){
  const inp=document.getElementById('ai-in');
  const msg=txt||(inp?inp.value.trim():'');
  if(!msg)return;
  if(inp)inp.value='';
  const box=document.getElementById('ai-msgs');
  if(!box)return;
  const u=state.user;
  box.innerHTML+=`
    <div style="display:flex;gap:9px;flex-direction:row-reverse">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;margin-top:2px">${u.prenom[0]}</div>
      <div style="max-width:78%;padding:10px 13px;border-radius:13px;border-top-right-radius:3px;background:var(--blue);color:#fff;font-size:12px;line-height:1.6">${msg}</div>
    </div>
    <div id="ai-loading" style="display:flex;gap:9px">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;margin-top:2px">IA</div>
      <div style="padding:10px 13px;border-radius:13px;border-top-left-radius:3px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <div style="width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite"></div>
        <span style="font-size:12px;color:var(--muted)">Analyse en cours...</span>
      </div>
    </div>`;
  box.scrollTop=box.scrollHeight;
  const m=msg.toLowerCase();
  let r=AI_R.default;
  if(m.includes('anomalie')||m.includes('erreur')||m.includes('détect'))r=AI_R.anomalie;
  else if(m.includes('manqu')||m.includes('indicateur'))r=AI_R.manquant;
  else if(m.includes('résumé')||m.includes('synthèse')||m.includes('executif'))r=AI_R.resume;
  else if(m.includes('compar')||m.includes('t1')||m.includes('t2'))r=AI_R.compare;
  setTimeout(()=>{
    const ld=document.getElementById('ai-loading');
    if(ld)ld.outerHTML=`
      <div style="display:flex;gap:9px">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;margin-top:2px">IA</div>
        <div style="max-width:82%;padding:10px 13px;border-radius:13px;border-top-left-radius:3px;background:var(--bg);border:1px solid var(--border);font-size:12px;line-height:1.7;white-space:pre-line">${r}</div>
      </div>`;
    box.scrollTop=box.scrollHeight;
  },900);
}

function bind(){
  const ep=document.getElementById('pw');
  if(ep)ep.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}

render();
